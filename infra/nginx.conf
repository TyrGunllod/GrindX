# ==========================================
# GrindX — Nginx Reverse Proxy
# ==========================================
# Modo de uso:
#   1. Instalar o Nginx (https://nginx.org/)
#   2. Substituir 192.168.1.100 pelo IP real da máquina
#   3. Copiar este arquivo para conf/nginx.conf
#   4. Iniciar: nginx
# ==========================================

server {
    listen 80;
    server_name 192.168.1.100;  # IP da máquina na rede

    # ==========================================
    # Frontend Estático
    # ==========================================
    location / {
        root C:/Projetos/GrindX/packages/frontend-webapp;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ==========================================
    # API PostgreSQL (proxy reverso)
    # ==========================================
    location /v1/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================
    # API SQL Server (proxy reverso)
    # ==========================================
    location /sqlserver/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================
    # Uploads (logotipos, etc.)
    # ==========================================
    location /uploads/ {
        alias C:/Projetos/GrindX/packages/api-postgres/uploads/;
    }
}
