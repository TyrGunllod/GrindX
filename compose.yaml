networks:
  nest:
    driver: bridge

services:
  frontend:
    build:
      context: ./apps/frontend-webapp
    container_name: grindx-frontend
    ports:
      - "8101:80"
      - "8001:8001"
      - "8002:8002"
    volumes:
      - ${HOME}/Containers/volumes/frontend_config/nginx.conf:/etc/nginx/conf.d/default.conf:ro,z
    networks:
      - nest
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  api-sqlserver:
    build:
      context: ./apps/api-sqlserver
    container_name: grindx-api-sqlserver
    user: "1001:1001"
    network_mode: "container:grindx-frontend"
    env_file: ./.env.sqlserver
    environment:
      - PYTHONPATH=/app:/app/packages
    volumes:
      - ./packages:/app/packages:z
      - ./.env.postgres:/app/.env:z
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  api-postgres:
    build:
      context: ./apps/api-postgres
    container_name: grindx-api-postgres
    user: "1001:1001"
    network_mode: "container:grindx-frontend"
    env_file: ./.env.postgres
    environment:
      - PYTHONPATH=/app:/app/packages
    volumes:
      - ./packages:/app/packages:z
      - ./.env.sqlserver:/app/.env:z
      - ${HOME}/Containers/volumes/api_uploads:/app/static/uploads:z
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
