networks:
  nest:
    driver: bridge

services:
  frontend:
    image: localhost/grindx-frontend:latest
    container_name: grindx-frontend
    ports:
      - "8101:80"
      - "8001:8001"
      - "8002:8002"
    volumes:
      - ${HOME:-.}/Containers/volumes/grindx/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro,z
      - ${PWD}/apps/frontend-webapp/modules:/usr/share/nginx/html/modules:z
    networks:
      - nest
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  api-sqlserver:
    image: localhost/grindx-api-sqlserver:latest
    container_name: grindx-api-sqlserver
    user: "1001:1001"
    network_mode: "container:grindx-frontend"
    env_file: ./.env.sqlserver
    environment:
      - PYTHONPATH=/app:/app/packages
    volumes:
      - ./packages:/app/packages:z
      - ./.env.sqlserver:/app/.env:z
      - ${PWD}/apps/api-sqlserver:/app:z
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  api-postgres:
    image: localhost/grindx-api-postgres:latest
    container_name: grindx-api-postgres
    user: "1001:1001"
    network_mode: "container:grindx-frontend"
    env_file: ./.env.postgres
    environment:
      - PYTHONPATH=/app:/app/packages
      - MONOREPO_ROOT=/app
      - IMPORT_DIR=/app/import
      - GRINDX_API_DIR=/app
      - GRINDX_SQLSERVER_API_DIR=/app/apps/api-sqlserver
    volumes:
      - ./packages:/app/packages:z
      - ./.env.postgres:/app/.env:z
      - ${HOME:-.}/Containers/volumes/grindx/api-postgres/uploads:/app/static/uploads:z
      - ./import:/app/import:z
      - ${PWD}/apps/frontend-webapp/modules:/app/apps/frontend-webapp/modules:z
      - ${PWD}/apps/api-sqlserver:/app/apps/api-sqlserver:z
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
