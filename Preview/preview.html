<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importar Modulos - GrindX (Preview)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="importer-preview.css">
</head>
<body class="module-page">
    <div class="container animate-in">
        <header class="page-header mb-8">
            <div>
                <h1>Importar Modulos</h1>
                <p class="text-muted">Instale e atualize modulos via arquivos .zip.</p>
            </div>
            <div class="actions-group" style="margin-top: var(--space-4);">
                <button class="btn btn-primary" title="Checar arquivos para importar">
                    <i class="fas fa-search"></i> Checar Arquivos
                </button>
            </div>
        </header>

        <div class="table-responsive" style="margin-top: 1.5rem;">
            <table class="w-full">
                <thead>
                    <tr>
                        <th scope="col"></th>
                        <th scope="col">Modulo</th>
                        <th scope="col">Versao</th>
                        <th scope="col">Schema</th>
                        <th scope="col">Status</th>
                        <th scope="col">Acoes</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Linha 1: Modulo importado -->
                    <tr class="module-row" data-slug="vendas">
                        <td><i class="fas fa-chevron-right expand-icon"></i></td>
                        <td>Vendas</td>
                        <td>1.2.0</td>
                        <td>vendas</td>
                        <td><span class="badge badge-success">Importado</span></td>
                        <td><button class="btn btn-sm btn-warning">Reimportar</button></td>
                    </tr>

                    <!-- Linha 2: Modulo expandido (card de detalhes) -->
                    <tr class="module-row" data-slug="estoque" style="background: rgba(0,194,224,0.02);">
                        <td><i class="fas fa-chevron-down expand-icon" style="color: var(--primary);"></i></td>
                        <td>Estoque</td>
                        <td>2.0.1</td>
                        <td>estoque</td>
                        <td><span class="badge badge-success">Importado</span></td>
                        <td><button class="btn btn-sm btn-warning">Reimportar</button></td>
                    </tr>
                    <!-- Card expandido da linha Estoque -->
                    <tr class="module-card-expanded-row">
                        <td colspan="6">
                            <div class="module-card-expanded">
                                <div class="card-grid">
                                    <div class="card-field">
                                        <div class="card-label">MODULO</div>
                                        <div class="card-value">Estoque</div>
                                    </div>
                                    <div class="card-field">
                                        <div class="card-label">VERSAO</div>
                                        <div class="card-value">2.0.1</div>
                                    </div>
                                    <div class="card-field">
                                        <div class="card-label">SCHEMA</div>
                                        <div class="card-value">estoque</div>
                                    </div>
                                </div>
                                <div class="card-actions">
                                    <button class="btn btn-sm btn-warning">Reimportar</button>
                                    <button class="btn btn-sm btn-secondary">Detalhes</button>
                                </div>
                            </div>
                        </td>
                    </tr>

                    <!-- Linha 3: Modulo novo -->
                    <tr class="module-row" data-slug="financeiro">
                        <td><i class="fas fa-chevron-right expand-icon"></i></td>
                        <td>Financeiro</td>
                        <td>1.0.0</td>
                        <td>financeiro</td>
                        <td><span class="badge badge-info">Novo</span></td>
                        <td><button class="btn btn-sm btn-primary">Importar</button></td>
                    </tr>

                    <!-- Linha 4: Modulo novo -->
                    <tr class="module-row" data-slug="rh">
                        <td><i class="fas fa-chevron-right expand-icon"></i></td>
                        <td>RH</td>
                        <td>3.1.0</td>
                        <td>rh</td>
                        <td><span class="badge badge-info">Novo</span></td>
                        <td><button class="btn btn-sm btn-primary">Importar</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
