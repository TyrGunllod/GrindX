name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ==========================================
  # API Postgres — testes
  # ==========================================
  test-api-postgres:
    name: Test API Postgres
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "sqlite:///:memory:"
      SECRET_KEY: test-secret-key-for-unit-tests-only-change-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      APP_NAME: "GrindX API Postgres"
      APP_VERSION: 0.1.0
      DEBUG: "true"
      LOG_LEVEL: DEBUG
      CORS_ORIGINS: '["*"]'
      RATE_LIMIT_REQUESTS: 100
      RATE_LIMIT_WINDOW_SECONDS: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/api-postgres/requirements.txt

      - name: Instalar dependências
        working-directory: packages/api-postgres
        run: pip install -r requirements.txt

      - name: Rodar testes
        working-directory: packages/api-postgres
        env:
          PYTHONPATH: ${{ github.workspace }}/packages
        run: pytest tests/ -v --tb=short --strict-markers

  # ==========================================
  # API SQL Server — testes
  # ==========================================
  test-api-sqlserver:
    name: Test API SQL Server
    runs-on: ubuntu-latest

    env:
      DB_SERVER: "127.0.0.1,1433"
      DB_DATABASE: grindx_test
      DB_USERNAME: sa
      DB_PASSWORD: Test@Password123
      DB_DRIVER: "ODBC Driver 17 for SQL Server"
      SECRET_KEY: test-secret-key-for-unit-tests-only-change-in-production
      APP_NAME: "GrindX API SQL Server"
      APP_VERSION: 0.1.0
      DEBUG: "false"
      LOG_LEVEL: INFO
      CORS_ORIGINS: '["*"]'
      RATE_LIMIT_REQUESTS: 100
      RATE_LIMIT_WINDOW_SECONDS: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/api-sqlserver/requirements.txt

      - name: Instalar dependências do sistema (ODBC)
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor --batch -o /usr/share/keyrings/microsoft-prod.gpg
          curl -fsSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql17 unixodbc-dev

      - name: Instalar dependências Python
        working-directory: packages/api-sqlserver
        run: pip install -r requirements.txt

      - name: Rodar testes
        working-directory: packages/api-sqlserver
        env:
          PYTHONPATH: ${{ github.workspace }}/packages
        run: pytest tests/ -v --tb=short --strict-markers

  # ==========================================
  # Testes raiz
  # ==========================================
  test-root:
    name: Test Monorepo
    runs-on: ubuntu-latest
    needs: [test-api-postgres, test-api-sqlserver]

    env:
      DATABASE_URL: "sqlite:///:memory:"
      SECRET_KEY: test-secret-key-for-unit-tests-only-change-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      DB_SERVER: "127.0.0.1,1433"
      DB_DATABASE: grindx_test
      DB_USERNAME: sa
      DB_PASSWORD: Test@Password123
      DB_DRIVER: "ODBC Driver 17 for SQL Server"
      APP_NAME: "GrindX"
      APP_VERSION: 0.1.0
      DEBUG: "false"
      LOG_LEVEL: INFO
      CORS_ORIGINS: '["*"]'
      RATE_LIMIT_REQUESTS: 100
      RATE_LIMIT_WINDOW_SECONDS: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências de todos os pacotes
        run: |
          pip install -r packages/api-postgres/requirements.txt
          pip install -r packages/api-sqlserver/requirements.txt

      - name: Rodar testes da raiz
        env:
          PYTHONPATH: ${{ github.workspace }}/packages:${{ github.workspace }}/packages/api-postgres:${{ github.workspace }}/packages/api-sqlserver
        run: pytest tests/ -v --tb=short --strict-markers

  # ==========================================
  # Lint
  # ==========================================
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Ruff
        run: pip install ruff>=0.3.0

      - name: Check
        run: ruff check packages/ --select E,F,I --ignore E501

      - name: Format check
        run: ruff format packages/ --check

  # ==========================================
  # Semantic Release
  # ==========================================
  release:
    name: Semantic Release
    needs: [test-root, lint]
    runs-on: ubuntu-latest
    concurrency: release
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar python-semantic-release
        run: pip install python-semantic-release

      - name: Run semantic release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          semantic-release version

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release publish
