name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ==========================================
  # API Postgres — 110+ testes (SQLite in-memory)
  # ==========================================
  test-api-postgres:
    name: API Postgres
    runs-on: ubuntu-latest

    env:
      # SQLite para testes — não precisa de PostgreSQL real
      DATABASE_URL: sqlite:///:memory:
      SECRET_KEY: test-secret-key-for-unit-tests-only-change-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      APP_NAME: "GrindX API Postgres"
      APP_VERSION: 0.1.0
      DEBUG: "true"
      LOG_LEVEL: DEBUG
      CORS_ORIGINS: '["*"]'
      RATE_LIMIT_REQUESTS: 100
      RATE_LIMIT_WINDOW_SECONDS: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/api-postgres/requirements.txt

      - name: Instalar dependências
        working-directory: packages/api-postgres
        run: pip install -r requirements.txt

      - name: Rodar testes
        working-directory: packages/api-postgres
        env:
          PYTHONPATH: ${{ github.workspace }}/packages
        run: pytest tests/ -v --tb=short --strict-markers

  # ==========================================
  # API SQL Server — testes unitários (sem DB real)
  # ==========================================
  test-api-sqlserver:
    name: API SQL Server
    runs-on: ubuntu-latest

    env:
      DB_SERVER: "127.0.0.1,1433"
      DB_DATABASE: grindx_test
      DB_USERNAME: sa
      DB_PASSWORD: Test@Password123
      DB_DRIVER: "ODBC Driver 17 for SQL Server"
      SECRET_KEY: test-secret-key-for-unit-tests-only-change-in-production
      APP_NAME: "GrindX API SQL Server"
      APP_VERSION: 0.1.0
      DEBUG: "false"
      LOG_LEVEL: INFO
      CORS_ORIGINS: '["*"]'
      RATE_LIMIT_REQUESTS: 100
      RATE_LIMIT_WINDOW_SECONDS: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/api-sqlserver/requirements.txt

      - name: Instalar dependências do sistema (ODBC)
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql17 unixodbc-dev

      - name: Instalar dependências Python
        working-directory: packages/api-sqlserver
        run: pip install -r requirements.txt

      - name: Rodar testes
        working-directory: packages/api-sqlserver
        env:
          PYTHONPATH: ${{ github.workspace }}/packages
        run: pytest tests/ -v --tb=short --strict-markers

  # ==========================================
  # Testes raiz — validação do monorepo
  # ==========================================
  test-root:
    name: Monorepo (raiz)
    runs-on: ubuntu-latest
    needs: [test-api-postgres, test-api-sqlserver]

    env:
      DATABASE_URL: sqlite:///:memory:
      SECRET_KEY: test-secret-key-for-unit-tests-only-change-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      DB_SERVER: "127.0.0.1,1433"
      DB_DATABASE: grindx_test
      DB_USERNAME: sa
      DB_PASSWORD: Test@Password123
      DB_DRIVER: "ODBC Driver 17 for SQL Server"
      APP_NAME: "GrindX"
      APP_VERSION: 0.1.0
      DEBUG: "false"
      LOG_LEVEL: INFO
      CORS_ORIGINS: '["*"]'
      RATE_LIMIT_REQUESTS: 100
      RATE_LIMIT_WINDOW_SECONDS: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências de todos os pacotes
        run: |
          pip install -r packages/api-postgres/requirements.txt
          pip install -r packages/api-sqlserver/requirements.txt

      - name: Rodar testes da raiz
        env:
          PYTHONPATH: ${{ github.workspace }}/packages:${{ github.workspace }}/packages/api-postgres:${{ github.workspace }}/packages/api-sqlserver
        run: pytest tests/ -v --tb=short --strict-markers
