<!doctype html>
<html lang="pt-BR"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <title>GrindX — Dashboard</title>
    
    <!-- Favicon & PWA Assets -->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="mask-icon" href="assets/mask-icon.svg" color="#00c2e0">
    <link rel="manifest" href="assets/site.webmanifest">
    <meta name="theme-color" content="#00c2e0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Shared Architecture -->
    <link rel="stylesheet" href="shared/core.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body class="dashboard-layout layout-topbar">

    <!-- A11y: Skip to content link -->
    <a href="#moduleViewport" class="sr-only focus:not-sr-only">Pular para o conteúdo</a>

     <!-- Navigation Sidebar (Mobile Overlay + Desktop Persistent) -->
      <aside class="sidebar" id="sidebar" aria-label="Navegação Principal">
           <header class="sidebar-header">
                 <div class="logo-grindx font-display logo-clickable" style="font-size: 1.3rem; letter-spacing: 3px;" tabindex="0" role="button" aria-label="Menu do usuário" aria-haspopup="true">
                     <span class="logo-text">GrindX</span>
                       <div class="user-dropdown" id="userDropdownSidebar" role="menu">
                         <div class="dropdown-user-info">
                             <strong class="dropdown-user-name" id="userNameSidebar">...</strong>
                             <span class="dropdown-user-role" id="userRoleSidebar">...</span>
                         </div>
                         <div class="nav-dropdown-divider"></div>
                         <button class="nav-dropdown-item" role="menuitem" data-profile="true">
                             <i class="fas fa-user"></i> Meu Perfil
                         </button>
                         <div class="nav-dropdown-divider"></div>
                         <button class="nav-dropdown-item danger" role="menuitem" id="logoutBtnSidebar">
                             <i class="fas fa-power-off"></i> Sair
                         </button>
                     </div>
               </div>
               <button class="btn-icon collapse-btn hide-mobile" id="toggleCollapse" aria-label="Recolher menu">
                  <i class="fas fa-chevron-left"></i>
              </button>
              <button class="btn-close-mobile md-hide" id="closeSidebar" aria-label="Fechar menu">
                  <i class="fas fa-times"></i>
              </button>
          </header>

          <nav class="sidebar-nav" id="mainNav">
               <div class="nav-group">
                   <div class="nav-title">
                       <div class="nav-title-label">
                           <i class="fas fa-th-large"></i>
                           <span>Menu</span>
                       </div>
                   </div>
                   <button type="button" class="nav-link active" data-module="home">
                       <i class="fas fa-home"></i> <span>Dashboard</span>
                   </button>
                   <button type="button" class="nav-link" data-module="estoque">
                       <i class="fas fa-box"></i> <span>Estoque</span>
                   </button>
               </div>

               <div class="nav-group admin-only" id="adminNav" style="display: none;">
                   <div class="nav-title">
                       <div class="nav-title-label">
                           <i class="fas fa-cog"></i>
                           <span>Gestão</span>
                       </div>
                   </div>
                   <button type="button" class="nav-link" data-module="admin-users">
                       <i class="fas fa-users-cog"></i> <span>Usuários</span>
                   </button>
               </div>
           </nav>

          <footer class="sidebar-footer">
               <div class="copyright-text">© 2026 GrindX. Desenvolvido por Alex Grellet.</div>
            </footer>
        </aside>

        <!-- Sidebar overlay (mobile) -->
        <div id="sidebarOverlay" class="sidebar-overlay" aria-hidden="true"></div>

        <!-- Navigation Topbar (Topbar Mode) -->
       <header class="topbar" id="topbar" style="display:none;" role="banner">
            <div class="topbar-logo logo-clickable" tabindex="0" role="button" aria-label="Menu do usuário" aria-haspopup="true">
                <span class="logo-text">GrindX</span>
                 <div class="user-dropdown" id="userDropdownTopbar" role="menu">
                   <div class="dropdown-user-info">
                       <strong class="dropdown-user-name" id="userNameTopbarDropdown">...</strong>
                       <span class="dropdown-user-role" id="userRoleTopbarDropdown">...</span>
                   </div>
                   <div class="nav-dropdown-divider"></div>
                   <button class="nav-dropdown-item" role="menuitem" data-profile="true">
                       <i class="fas fa-user"></i> Meu Perfil
                   </button>
                   <div class="nav-dropdown-divider"></div>
                   <button class="nav-dropdown-item danger" role="menuitem" id="logoutBtnTopbar">
                       <i class="fas fa-power-off"></i> Sair
                   </button>
               </div>
           </div>
           <nav class="topbar-nav" id="topbarNav" aria-label="Navegação Principal">
               <!-- Renderizado dinamicamente por renderTopbarNav() -->
           </nav>
           <div class="topbar-right" id="topbarRight">
               <!-- Espaço reservado para futuras abas -->
           </div>
       </header>

      <!-- Preview Banner (shown when skin_preview query param is present) -->
      <div id="skinPreviewBanner" class="skin-preview-banner" style="display: none;">
          <div class="skin-preview-banner-content">
              <span id="skinPreviewBannerText">🔍 Preview da skin 'Carregando...'</span>
              <div class="skin-preview-banner-actions">
                  <button id="applyPermanentBtn" class="btn btn-primary">Aplicar Permanentemente</button>
                  <button id="closePreviewBtn" class="btn btn-secondary">Fechar Preview</button>
              </div>
          </div>
      </div>

      <!-- Main Viewport -->
     <main class="main-viewport">
         <header class="top-bar">
             <button class="btn-icon md-hide" id="openSidebar" aria-label="Abrir menu">
                 <i class="fas fa-bars"></i>
             </button>
             <div class="top-bar-title" id="activeModuleTitle">Painel de Controle</div>
         </header>

         <div class="zoom-controls" id="zoomControls" style="display:none">
             <button type="button" class="btn-icon zoom-btn" id="zoomOut" title="Reduzir zoom"><i class="fas fa-search-minus"></i></button>
             <span class="zoom-level" id="zoomLevel">100%</span>
             <button type="button" class="btn-icon zoom-btn" id="zoomIn" title="Aumentar zoom"><i class="fas fa-search-plus"></i></button>
             <button type="button" class="btn-icon zoom-btn" id="zoomReset" title="Redefinir zoom"><i class="fas fa-expand"></i></button>
         </div>

         <section class="content-area" id="moduleViewport" role="region" aria-live="polite">
             <!-- Os módulos serão injetados aqui -->
             <div class="loader-overlay" id="moduleLoader" style="display: none;">
                 <div class="spinner"></div>
             </div>
         </section>
     </main>



    <!-- Core Scripts -->
    <script src="shared/config.js"></script>
    <script src="shared/app.js"></script>
    <script src="shared/apiService.js"></script>
    <script src="shared/baseController.js"></script>
    <script src="shared/components/ReusableModal.js"></script>
    <script src="shared/skinLoader.js"></script>
    <script src="dashboard.js"></script>


</body></html>
