<!doctype html>
<html lang="pt-BR"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrindX — Dashboard</title>
    
    <!-- Favicon & PWA Assets -->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="mask-icon" href="assets/mask-icon.svg" color="#00c2e0">
    <link rel="manifest" href="assets/site.webmanifest">
    <meta name="theme-color" content="#00c2e0">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Shared Architecture -->
    <link rel="stylesheet" href="shared/core.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body class="dashboard-layout">

    <!-- A11y: Skip to content link -->
    <a href="#moduleViewport" class="sr-only focus:not-sr-only">Pular para o conteúdo</a>

     <!-- Navigation Sidebar (Mobile Overlay + Desktop Persistent) -->
      <aside class="sidebar" id="sidebar" aria-label="Navegação Principal">
           <header class="sidebar-header">
               <div class="logo-grindx font-display" style="font-size: 1.3rem; letter-spacing: 3px; color: var(--text-main);padding: 5px" aria-hidden="true">
                    G<span class="logo-full">RIND</span><span style="color: var(--brand-is);">X</span>
               </div>
               <button class="btn-icon collapse-btn hide-mobile" id="toggleCollapse" aria-label="Recolher menu">
                  <i class="fas fa-chevron-left"></i>
              </button>
              <button class="btn-close-mobile md-hide" id="closeSidebar" aria-label="Fechar menu">
                  <i class="fas fa-times"></i>
              </button>
          </header>

          <nav class="sidebar-nav" id="mainNav">
               <div class="nav-group">
                   <div class="nav-title">
                       <div class="nav-title-label">
                           <i class="fas fa-th-large"></i>
                           <span>Menu</span>
                       </div>
                   </div>
                   <button type="button" class="nav-link active" data-module="home">
                       <i class="fas fa-home"></i> <span>Dashboard</span>
                   </button>
                   <button type="button" class="nav-link" data-module="estoque">
                       <i class="fas fa-box"></i> <span>Estoque</span>
                   </button>
               </div>

               <div class="nav-group admin-only" id="adminNav" style="display: none;">
                   <div class="nav-title">
                       <div class="nav-title-label">
                           <i class="fas fa-cog"></i>
                           <span>Gestão</span>
                       </div>
                   </div>
                   <button type="button" class="nav-link" data-module="admin-users">
                       <i class="fas fa-users-cog"></i> <span>Usuários</span>
                   </button>
               </div>
           </nav>

          <footer class="sidebar-footer">
              <div class="user-pill">
                  <div id="userAvatar" class="avatar" aria-hidden="true">...</div>
                  <div class="user-meta">
                      <strong id="userName">...</strong>
                      <span id="userRole">...</span>
                  </div>
                  <button id="logoutBtn" class="btn-icon" aria-label="Encerrar sessão">
                      <i class="fas fa-power-off"></i>
                  </button>
              </div>
              <div class="copyright-text">© 2026 GrindX. Desenvolvido por Alex Grellet.</div>
           </footer>
       </aside>

      <!-- Preview Banner (shown when skin_preview query param is present) -->
      <div id="skinPreviewBanner" class="skin-preview-banner" style="display: none;">
          <div class="skin-preview-banner-content">
              <span id="skinPreviewBannerText">🔍 Preview da skin 'Carregando...'</span>
              <div class="skin-preview-banner-actions">
                  <button id="applyPermanentBtn" class="btn btn-primary">Aplicar Permanentemente</button>
                  <button id="closePreviewBtn" class="btn btn-secondary">Fechar Preview</button>
              </div>
          </div>
      </div>

      <!-- Main Viewport -->
     <main class="main-viewport">
         <header class="top-bar" style="padding: 15px;">
             <button class="btn-icon md-hide" id="openSidebar" aria-label="Abrir menu">
                 <i class="fas fa-bars"></i>
             </button>
             <div class="top-bar-title" id="activeModuleTitle">Painel de Controle</div>
             <button class="btn-icon theme-toggle" id="themeToggle" aria-label="Alternar tema">
                 <i class="fas fa-moon"></i>
             </button>
         </header>

         <section class="content-area" id="moduleViewport" role="region" aria-live="polite" style="padding: 5px; margin: 0px;">
             <!-- Os módulos serão injetados aqui -->
             <div class="loader-overlay" id="moduleLoader" style="display: none;">
                 <div class="spinner"></div>
             </div>
         </section>
     </main>

    <!-- Password Change Modal -->
    <div class="modal-overlay" id="passwordModal" role="dialog" aria-modal="true" style="display: none;">
        <div class="modal-card" style="max-width: 420px;">
            <header class="modal-header">
                <h3>Alterar Senha</h3>
            </header>
            <form id="passwordForm">
                <div class="form-group">
                    <label for="currentPassword">Senha Atual</label>
                    <input type="password" id="currentPassword" class="form-control" required minlength="1">
                </div>
                <div class="form-group">
                    <label for="newPassword">Nova Senha</label>
                    <input type="password" id="newPassword" class="form-control" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirmar Nova Senha</label>
                    <input type="password" id="confirmPassword" class="form-control" required minlength="6">
                </div>
            </form>
            <footer class="modal-footer flex justify-end gap-2">
                <button id="cancelPasswordBtn" class="btn btn-secondary" type="button">Cancelar</button>
                <button id="savePasswordBtn" class="btn btn-primary" type="button">Salvar</button>
            </footer>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="shared/app.js"></script>
    <script src="shared/apiService.js"></script>
    <script src="shared/baseController.js"></script>
    <script src="shared/components/ReusableModal.js"></script>
    <script src="shared/skinLoader.js"></script>
    <script src="dashboard.js"></script>


</body></html>
