<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="page-container">
        <header class="page-header">
            <h1>Tarefas</h1>
            <button class="btn btn-primary" id="btn-nova-tarefa" data-i18n="nova_tarefa">Nova Tarefa</button>
        </header>

        <section class="filters">
            <div class="filter-group">
                <label for="filter-projeto" data-i18n="projeto">Projeto</label>
                <select id="filter-projeto">
                    <option value="" data-i18n="todos_projetos">Todos os Projetos</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filter-status" data-i18n="status">Status</label>
                <select id="filter-status">
                    <option value="" data-i18n="todos_status">Todos os Status</option>
                    <option value="todo" data-i18n="a_fazer">A Fazer</option>
                    <option value="in-progress" data-i18n="em_progresso">Em Progresso</option>
                    <option value="done" data-i18n="concluida">Concluída</option>
                </select>
            </div>
        </section>

        <section class="kanban-board" id="kanban-board">
            <div class="kanban-column" data-status="todo">
                <h2 class="column-title" data-i18n="a_fazer">A Fazer</h2>
                <div class="column-cards" id="column-todo"></div>
            </div>
            <div class="kanban-column" data-status="in-progress">
                <h2 class="column-title" data-i18n="em_progresso">Em Progresso</h2>
                <div class="column-cards" id="column-in-progress"></div>
            </div>
            <div class="kanban-column" data-status="done">
                <h2 class="column-title" data-i18n="concluida">Concluída</h2>
                <div class="column-cards" id="column-done"></div>
            </div>
        </section>
    </div>

    <div class="modal-overlay hidden" id="modal-tarefa">
        <div class="modal">
            <header class="modal-header">
                <h2 id="modal-title" data-i18n="nova_tarefa">Nova Tarefa</h2>
                <button class="modal-close" id="btn-modal-close">&times;</button>
            </header>
            <form id="form-tarefa" class="modal-body">
                <div class="form-group">
                    <label for="field-titulo" data-i18n="titulo">Título</label>
                    <input type="text" id="field-titulo" required minlength="2" maxlength="255">
                </div>
                <div class="form-group">
                    <label for="field-descricao" data-i18n="descricao">Descrição</label>
                    <textarea id="field-descricao" rows="2"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="field-projeto" data-i18n="projeto">Projeto</label>
                        <select id="field-projeto" required></select>
                    </div>
                    <div class="form-group">
                        <label for="field-responsavel" data-i18n="responsavel">Responsável</label>
                        <select id="field-responsavel"></select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="field-data-inicio" data-i18n="data_inicio">Data Início</label>
                        <input type="date" id="field-data-inicio" required>
                    </div>
                    <div class="form-group">
                        <label for="field-data-fim" data-i18n="data_fim">Data Fim</label>
                        <input type="date" id="field-data-fim" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="field-status" data-i18n="status">Status</label>
                        <select id="field-status">
                            <option value="todo" data-i18n="a_fazer">A Fazer</option>
                            <option value="in-progress" data-i18n="em_progresso">Em Progresso</option>
                            <option value="done" data-i18n="concluida">Concluída</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="field-prioridade" data-i18n="prioridade">Prioridade</label>
                        <select id="field-prioridade">
                            <option value="low" data-i18n="baixa">Baixa</option>
                            <option value="medium" selected data-i18n="media">Média</option>
                            <option value="high" data-i18n="alta">Alta</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="field-progresso" data-i18n="progresso">Progresso: <span id="progresso-value">0</span>%</label>
                    <input type="range" id="field-progresso" min="0" max="100" step="5" value="0">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="btn-cancelar" data-i18n="cancelar">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="btn-salvar" data-i18n="salvar">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="drawer-overlay hidden" id="drawer-registros">
        <div class="drawer">
            <header class="drawer-header">
                <h2 data-i18n="registros_tarefa">Registros da Tarefa</h2>
                <span id="drawer-tarefa-info" class="drawer-tarefa-info"></span>
                <button class="modal-close" id="btn-drawer-close">&times;</button>
            </header>
            <div class="drawer-body" id="drawer-body">
                <div class="registros-timeline" id="registros-timeline"></div>
                <div class="registro-empty hidden" id="registro-empty">
                    <p data-i18n="sem_registros">Nenhum registro ainda.</p>
                </div>
            </div>
            <footer class="drawer-footer">
                <form id="form-registro" class="registro-form">
                    <div class="form-row">
                        <div class="form-group">
                            <select id="field-registro-tipo">
                                <option value="log" data-i18n="log">Log</option>
                                <option value="decisao" data-i18n="decisao">Decisão</option>
                            </select>
                        </div>
                        <div class="form-group grow">
                            <input type="text" id="field-registro-conteudo" placeholder="Adicionar registro..." required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm" data-i18n="adicionar">Adicionar</button>
                    </div>
                </form>
            </footer>
        </div>
    </div>

    <div class="modal-overlay hidden" id="modal-confirm">
        <div class="modal modal-sm">
            <header class="modal-header">
                <h2 data-i18n="confirmar_exclusao">Confirmar Exclusão</h2>
            </header>
            <div class="modal-body">
                <p data-i18n="confirmar_exclusao_msg">Tem certeza que deseja excluir esta tarefa?</p>
            </div>
            <footer class="modal-footer">
                <button class="btn btn-secondary" id="btn-confirm-cancel" data-i18n="cancelar">Cancelar</button>
                <button class="btn btn-danger" id="btn-confirm-delete" data-i18n="excluir">Excluir</button>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
