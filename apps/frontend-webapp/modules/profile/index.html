<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../shared/core.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="module-page">
        <div class="profile-container">

            <div class="profile-card" id="profileDataCard">
                <h2><i class="fas fa-user-circle"></i> Meus Dados</h2>
                <form id="profileForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nome de Usuário</label>
                            <input type="text" id="profileUsername" class="form-control" disabled>
                        </div>
                        <div class="form-group">
                            <label>Perfil</label>
                            <input type="text" id="profileRole" class="form-control" disabled>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" id="profileName" class="form-control" disabled>
                    </div>

                    <hr class="field-divider">

                    <div class="form-row form-row-3">
                        <div class="form-group">
                            <label for="profileCodigo">Código</label>
                            <input type="text" id="profileCodigo" class="form-control">
                        </div>
                        <div class="form-group">
                            <label for="profileCbo">C.B.O</label>
                            <input type="text" id="profileCbo" class="form-control">
                        </div>
                        <div class="form-group">
                            <label for="profileSalario">Salário Base</label>
                            <input type="text" id="profileSalario" class="form-control" inputmode="decimal">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="profileDepartamento">Departamento</label>
                        <input type="text" id="profileDepartamento" class="form-control">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="profileCargo">Cargo</label>
                            <input type="text" id="profileCargo" class="form-control">
                        </div>
                        <div class="form-group">
                            <label for="profileClassificacao">Classificação</label>
                            <select id="profileClassificacao" class="form-control">
                                <option value="">Selecione...</option>
                                <option value="Junior">Junior</option>
                                <option value="Pleno">Pleno</option>
                                <option value="Senior">Senior</option>
                                <option value="I">I</option>
                                <option value="II">II</option>
                                <option value="III">III</option>
                                <option value="IV">IV</option>
                                <option value="V">V</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="profileCpf">CPF</label>
                            <input type="text" id="profileCpf" class="form-control" maxlength="14" inputmode="numeric">
                        </div>
                        <div class="form-group">
                            <label for="profileRg">RG</label>
                            <input type="text" id="profileRg" class="form-control" maxlength="12" inputmode="numeric">
                        </div>
                    </div>
                    <div class="form-row form-row-addr">
                        <div class="form-group form-group-grow">
                            <label for="profileEndereco">Endereço</label>
                            <input type="text" id="profileEndereco" class="form-control">
                        </div>
                        <div class="form-group form-group-sm">
                            <label for="profileNumero">Nº</label>
                            <input type="text" id="profileNumero" class="form-control" maxlength="6">
                        </div>
                        <div class="form-group form-group-cep">
                            <label for="profileCep">CEP</label>
                            <input type="text" id="profileCep" class="form-control" maxlength="9" inputmode="numeric">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="profileTelefone">Telefone</label>
                            <input type="text" id="profileTelefone" class="form-control" maxlength="14" inputmode="numeric">
                        </div>
                        <div class="form-group">
                            <label for="profileCelular">Celular</label>
                            <input type="text" id="profileCelular" class="form-control" maxlength="15" inputmode="numeric">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="profileEmail">E-mail</label>
                        <input type="email" id="profileEmail" class="form-control" required>
                        <span class="field-error" id="emailError" style="display:none;"></span>
                    </div>
                </form>
                <button class="btn btn-primary card-save-btn" id="saveProfileBtn"><i class="fas fa-save"></i> Salvar</button>
            </div>

            <div class="profile-card-row">
                <div class="profile-card" id="passwordCard">
                    <h2><i class="fas fa-key"></i> Alterar Senha</h2>
                    <form id="passwordForm">
                        <div class="form-group">
                            <label for="currentPassword">Senha Atual</label>
                            <input type="password" id="currentPassword" class="form-control" minlength="1">
                        </div>
                        <div class="form-group">
                            <label for="newPassword">Nova Senha</label>
                            <input type="password" id="newPassword" class="form-control" minlength="6">
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Confirmar Nova Senha</label>
                            <input type="password" id="confirmPassword" class="form-control" minlength="6">
                        </div>
                        <span class="field-error" id="passwordError" style="display:none;"></span>
                    </form>
                    <button class="btn btn-primary card-save-btn" id="savePasswordBtn"><i class="fas fa-save"></i> Salvar</button>
                </div>

                <div class="profile-card" id="preferencesCard">
                    <h2><i class="fas fa-palette"></i> Preferências</h2>
                    <div class="form-group">
                        <label>Tema</label>
                        <div class="toggle-group">
                            <button type="button" class="toggle-option" data-theme="light">
                                <i class="fas fa-sun"></i> Claro
                            </button>
                            <button type="button" class="toggle-option" data-theme="dark">
                                <i class="fas fa-moon"></i> Escuro
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Layout Desktop</label>
                        <div class="toggle-group" id="layoutDesktopGroup">
                            <button type="button" class="toggle-option" data-layout="topbar">
                                <i class="fas fa-window-maximize"></i> Topbar
                            </button>
                            <button type="button" class="toggle-option" data-layout="sidebar">
                                <i class="fas fa-bars"></i> Sidebar
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Layout Celular / Tablet</label>
                        <div class="toggle-group" id="layoutMobileGroup">
                            <button type="button" class="toggle-option" data-layout-mobile="topbar">
                                <i class="fas fa-window-maximize"></i> Topbar
                            </button>
                            <button type="button" class="toggle-option" data-layout-mobile="sidebar">
                                <i class="fas fa-bars"></i> Sidebar
                            </button>
                        </div>
                        <small class="form-hint">Aplicado automaticamente em telas menores que 768px.</small>
                    </div>
                    <button class="btn btn-primary card-save-btn" id="savePreferencesBtn"><i class="fas fa-save"></i> Salvar</button>
                </div>
            </div>

        </div>
    </div>

    <script src="../../shared/config.js"></script>
    <script src="../../shared/app.js"></script>
    <script src="../../shared/apiService.js"></script>
    <script src="script.js"></script>
</body>
</html>
