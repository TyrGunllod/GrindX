<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importar Módulos — GrindX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../shared/core.css">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class = "module-page">
    <div class="container animate-in">
        <header class="page-header mb-8">
            <div>
                <h1>Importar Módulos</h1>
                <p class="text-muted">Instale e atualize módulos via arquivos .zip.</p>
            </div>
            <div class="actions-group" style="margin-top: var(--space-4);">
                <button class="btn btn-primary" id="btnScan" title="Atualizar lista de módulos">
                    <i class="fas fa-sync"></i> <span class="hide-mobile">Atualizar</span>
                </button>
            </div>
				
        </header>

        <div class="table-responsive" style="margin-top: 1.5rem;">
            <h2 style="margin-bottom:var(--space-3);padding: 5pt 0pt 0pt 10pt;">Disponíveis para Importar</h2>
            <table class="w-full">
                <thead>
                    <tr>
                        <th scope="col">Módulo</th>
                        <th scope="col">Versão</th>
                        <th scope="col">Schema</th>
                        <th scope="col">Status</th>
                        <th scope="col">Ações</th>
                    </tr>
                </thead>
                <tbody id="dataTableContainer">
                    <tr>
                        <td colspan="5" class="text-center text-muted" style="padding: 2rem;">
                            Clique em "Atualizar" para escanear a pasta de importação.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="table-responsive" style="margin-top: 2rem;">
            <h2 style="margin-bottom:var(--space-3); padding: 5pt 0pt 0pt 10pt;">Módulos Instalados</h2>
            <table class="w-full">
                <thead>
                    <tr>
                        <th scope="col">Módulo</th>
                        <th scope="col">Versão</th>
                        <th scope="col">API</th>
                        <th scope="col">Ações</th>
                    </tr>
                </thead>
                <tbody id="instaladosTableContainer">
                    <tr>
                        <td colspan="4" class="text-center text-muted" style="padding: 2rem;">
                            Carregando módulos instalados...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay hidden" id="importModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Importar Módulo</h2>
                <button type="button" class="modal-close" id="btnModalClose">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="btnCancel">Cancelar</button>
                <button class="btn btn-primary" id="btnConfirm">Importar</button>
            </div>
        </div>
    </div>

    <script src="../../shared/config.js"></script>
    <script src="../../shared/app.js"></script>
    <script src="../../shared/apiService.js"></script>
    <script src="../../shared/components/LoadingSpinner.js"></script>
    <script src="../../shared/components/DataTable.js"></script>
    <script src="../../shared/components/ReusableModal.js"></script>
    <script src="../../shared/baseController.js"></script>
    <script src="script.js"></script> 
</body>
</html>
