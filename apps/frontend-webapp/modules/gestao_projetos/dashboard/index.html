<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — GrindX</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <div>
                <h1>Dashboard</h1>
                <p class="text-muted">Visão geral dos seus projetos e tarefas</p>
            </div>
        </div>

        <div id="metrics-grid" class="metrics-grid"></div>

        <div id="status-grid" class="status-grid"></div>

        <div id="projetos-section" class="card"></div>

        <div id="equipe-section" class="card"></div>

        <div id="loading" class="loading-spinner">Carregando...</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
