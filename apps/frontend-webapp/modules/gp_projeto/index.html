<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projetos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-container" id="app">
    <div class="page-header">
      <div>
        <h1>Projetos</h1>
        <p class="text-muted">Gerencie todos os seus projetos em um so lugar</p>
      </div>
      <button id="btn-novo-projeto" class="btn btn-primary">+ Novo Projeto</button>
    </div>

    <div id="projetos-grid" class="projetos-grid"></div>

    <div id="empty-state" class="empty-state hidden">
      <div class="empty-state__icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      </div>
      <h3>Nenhum projeto encontrado</h3>
      <p>Comece criando seu primeiro projeto</p>
      <button id="btn-empty-criar" class="btn btn-primary">+ Criar Projeto</button>
    </div>
  </div>

  <div id="projeto-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" style="display: none;">
    <div class="modal-card">
      <header class="modal-header flex justify-between">
        <h3 id="modal-title">Novo Projeto</h3>
        <button class="btn-icon" id="close-modal" aria-label="Fechar">&times;</button>
      </header>
      <form id="projeto-form" class="grid grid-md-2">
        <div class="form-group">
          <label for="input-nome">Nome do Projeto</label>
          <input id="input-nome" type="text" required minlength="2" maxlength="200" placeholder="Digite o nome do projeto">
        </div>

        <div class="form-group">
          <label for="input-descricao">Descricao</label>
          <textarea id="input-descricao" rows="3" placeholder="Descreva o projeto"></textarea>
        </div>

        <div class="form-group">
          <label for="input-data-inicio">Data de Inicio</label>
          <input id="input-data-inicio" type="date" required>
        </div>

        <div class="form-group">
          <label for="input-data-fim">Data de Termino</label>
          <input id="input-data-fim" type="date" required>
        </div>

        <div class="form-group">
          <label for="input-status">Status</label>
          <select id="input-status">
            <option value="planning">Planejamento</option>
            <option value="active">Ativo</option>
            <option value="completed">Concluido</option>
            <option value="on-hold">Em Espera</option>
          </select>
        </div>

        <div class="form-group">
          <label for="input-gerente">Gerente</label>
          <select id="input-gerente">
            <option value="">Selecione</option>
          </select>
        </div>

        <div class="form-group">
          <label>Cor do Projeto</label>
          <div id="color-palette" class="color-palette"></div>
        </div>
      </form>
      <footer class="modal-footer flex justify-end gap-2">
        <button type="button" class="btn" id="btn-modal-cancelar">Cancelar</button>
        <button type="button" class="btn btn-primary" id="btn-modal-salvar">Criar Projeto</button>
      </footer>
    </div>
  </div>

  <div id="confirm-dialog" class="modal-overlay" role="dialog" aria-modal="true" style="display: none;">
    <div class="modal-card modal-card--sm">
      <header class="modal-header flex justify-between">
        <h3>Excluir projeto?</h3>
        <button class="btn-icon" id="btn-confirm-close" aria-label="Fechar">&times;</button>
      </header>
      <p>Esta acao nao pode ser desfeita.</p>
      <footer class="modal-footer flex justify-end gap-2">
        <button type="button" class="btn" id="btn-confirm-cancelar">Cancelar</button>
        <button type="button" class="btn btn-danger" id="btn-confirm-excluir">Excluir</button>
      </footer>
    </div>
  </div>

  <div id="loading" class="loading-spinner hidden">Carregando...</div>
  <div id="toast" class="toast hidden"></div>

  <script src="script.js"></script>
</body>
</html>
