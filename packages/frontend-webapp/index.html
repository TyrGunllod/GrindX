<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portal de Acesso Seguro — GrindX">
    <title>GrindX — Login</title>
    
    <!-- Favicon & PWA Assets -->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="mask-icon" href="assets/mask-icon.svg" color="#00c2e0">
    <link rel="manifest" href="assets/site.webmanifest">
    <meta name="theme-color" content="#00c2e0">
    
    <!-- Shared Design System -->
    <link rel="stylesheet" href="shared/core.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="background-blobs" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
         <div class="card login-card animate-in">
            <header class="text-center mb-8">
                 <div class="font-display" style="font-size: 2.5rem; letter-spacing: 4px; margin-bottom: 1rem; color: var(--text-main);" aria-hidden="true">
                     GRIND<span style="color: var(--brand-is);">X</span>
                 </div>
                  <h1 id="mainTitle" style="font-size: 1.25rem; font-weight: 600;">Bem-vindo</h1>
                 <p class="text-muted" id="subTitle">Acesse sua conta para continuar</p>
             </header>

            <form id="loginForm" class="grid" novalidate>
                <div class="form-group">
                    <label for="username" id="labelUser">Usuário</label>
                    <input type="text" id="username" name="username" 
                           autocomplete="username" required 
                           aria-describedby="userHint"
                           placeholder="Ex: admin">
                </div>

                <div class="form-group">
                    <label for="password" id="labelPass">Senha</label>
                    <input type="password" id="password" name="password" 
                           autocomplete="current-password" required
                           placeholder="••••••••">
                    <a href="#" class="link-sm forgot-link" id="linkForgot">Esqueceu a senha?</a>
                </div>

                <div class="flex items-center gap-2 mb-4">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember" class="text-sm">Lembrar de mim</label>
                </div>

                <button type="submit" class="btn btn-primary w-full" id="btnSubmit">
                    <span>Entrar no Sistema</span>
                </button>

                <div id="errorMessage" class="alert alert-error" role="alert" aria-live="polite"></div>
            </form>

            <div style="text-align: center; font-size: 0.7rem; color: var(--text-muted); margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                © 2026 GrindX. Desenvolvido por Alex Grellet.
            </div>
        </div>
    </main>

    <!-- Core Scripts -->
    <script src="shared/app.js"></script>
    <script src="shared/apiService.js"></script>
    <script src="shared/validation.js"></script>
    <script src="shared/components/LoadingSpinner.js"></script>
    <script src="shared/skinLoader.js"></script>
    <script src="script.js"></script>
</body>
</html>
