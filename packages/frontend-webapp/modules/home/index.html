<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../shared/core.css">
    <style>
        body { padding: 40px; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .welcome-card { background: var(--bg-card); padding: 60px; border-radius: 24px; border: 1px solid var(--border-color); max-width: 600px; }
        h1 { margin-bottom: 16px; color: var(--primary); }
        p { color: var(--text-muted); font-size: 1.1rem; }
    </style>
</head>
<body class="module-page">
    <div class="welcome-card animate-in">
        <i class="fas fa-rocket" style="font-size: 48px; color: var(--primary); margin-bottom: 24px;"></i>
        <h1>Bem-vindo ao GrindX</h1>
        <p>Este é o seu novo centro de controle modular. Utilize o menu lateral para navegar entre as funcionalidades disponíveis.</p>
    </div>
    <script src="../../shared/app.js"></script>
</body>
</html>
