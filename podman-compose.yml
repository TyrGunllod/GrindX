version: "3.9"

networks:
  erp-net:
    driver: bridge

services:
  api-sqlserver:
    build:
      context: ./apps/api-sqlserver
      containerfile: Containerfile
    image: erp/api-sqlserver:dev
    container_name: erp-api-sqlserver
    user: "1001:1001"
    ports:
      - "0.0.0.0:8001:8001"
    env_file: ./apps/api-sqlserver/.env
    networks:
      - erp-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    volumes:
      - ./packages/shared:/app/shared:z

  frontend:
    image: nginx:alpine
    container_name: erp-frontend
    ports:
      - "0.0.0.0:8080:80"
    volumes:
      - ./apps/frontend-webapp:/usr/share/nginx/html:z
      - ./apps/frontend-webapp/nginx.conf:/etc/nginx/conf.d/default.conf:ro,z
    networks:
      - erp-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  api-postgres:
    build:
      context: ./apps/api-postgres
      containerfile: Containerfile
    image: erp/api-postgres:dev
    container_name: erp-api-postgres
    user: "1001:1001"
    ports:
      - "0.0.0.0:8002:8002"
    env_file: ./apps/api-postgres/.env
    networks:
      - erp-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    volumes:
      - ./packages/shared:/app/shared:z
